<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account — Luno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <style>
    .acc-stage { position: relative; min-height: 60vh; }
    .acc-moon { position: absolute; z-index: 0; pointer-events: none; }
    .acc-moon--left { left: clamp(1rem, 8vw, 9rem); top: calc(50% - 250px); width: 150px; height: 150px; }
    .acc-moon--right { right: clamp(1rem, 8vw, 9rem); top: calc(50% + 40px); width: 110px; height: 110px; }
    .acc-moon--right .moon { animation-delay: -3.5s; }
    @media (max-width: 980px) { .acc-moon { display: none; } }

    .acc-card { position: relative; z-index: 1; max-width: 440px; margin-inline: auto; }
    .acc-tabs { display: flex; border: 1px solid var(--line-2); margin-bottom: 1.6rem; }
    .acc-tabs button {
      flex: 1; font: inherit; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
      font-size: var(--fs-xs); padding: .9rem; background: none; border: none; cursor: pointer; color: var(--ink-2);
    }
    .acc-tabs button.is-active { background: var(--ink); color: #fff; }
    .acc-field { margin-bottom: 1rem; }
    .acc-field input { width: 100%; border: 1px solid var(--line-2); padding: 1rem; font: inherit; }
    .acc-error { color: var(--sale); margin-top: .8rem; }
    .acc-ok { color: #1e7a2e; margin-top: .8rem; }
    .btn--google {
      display: flex; align-items: center; justify-content: center; gap: .6rem; width: 100%;
      background: #fff; color: var(--ink); border: 1px solid var(--line-2); padding: .95rem; font: inherit;
      font-weight: 600; cursor: pointer;
    }
    .btn--google:hover { border-color: var(--ink); }
    .acc-divider { display: flex; align-items: center; gap: 1rem; color: var(--ink-3); font-size: var(--fs-xs); margin: 1.4rem 0; }
    .acc-divider::before, .acc-divider::after { content: ''; flex: 1; border-top: 1px solid var(--line-2); }
    .acc-admin { text-align: center; margin-top: 2rem; font-size: var(--fs-sm); color: var(--ink-2); }
    .acc-admin a { color: var(--ink); border-bottom: 1px solid var(--ink); font-weight: 600; }

    /* signed-in view */
    .acc-panel { max-width: 720px; margin-inline: auto; position: relative; z-index: 1; }
    .acc-head { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; }
    .acc-section { border: 1px solid var(--line-2); padding: 1.6rem; margin-bottom: 1.6rem; background: #fff; }
    .acc-section h2 { font-family: var(--font-display); font-size: var(--fs-md); text-transform: uppercase; margin-bottom: 1.2rem; }
    .acc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .acc-grid .span2 { grid-column: 1 / -1; }
    .acc-grid label { display: block; font-weight: 600; font-size: var(--fs-sm); }
    .acc-grid input { width: 100%; border: 1px solid var(--line-2); padding: .9rem; font: inherit; font-weight: 400; margin-top: .3rem; }
    @media (max-width: 620px) { .acc-grid { grid-template-columns: 1fr; } }
    .acc-order { border: 1px solid var(--line-2); padding: 1rem; margin-bottom: .8rem; display: flex; justify-content: space-between; gap: 1rem; flex-wrap: wrap; align-items: center; }
    .acc-status { font-size: var(--fs-xs); font-weight: 700; text-transform: uppercase; letter-spacing: .06em; padding: .3rem .7rem; background: #eee; }
    .acc-status--pending { background: #fdf3d7; color: #9c7c10; }
    .acc-status--confirmed { background: #e2effb; color: #21618c; }
    .acc-status--shipped { background: #ece5fa; color: #5e3fa8; }
    .acc-status--delivered { background: #e3f4e6; color: #1e7a2e; }
    .acc-status--cancelled { background: #fde8e6; color: #c0392b; }
  </style>
</head>
<body>
  <div class="loader" id="luno-loader"></div>
  <div data-slot="header"></div>

  <main class="container section acc-stage" data-account>
    <div class="acc-moon acc-moon--left"><span class="moon moon--float" style="width:100%;height:100%"></span></div>
    <div class="acc-moon acc-moon--right"><span class="moon moon--float" style="width:100%;height:100%"></span></div>
    <div data-acc-root></div>
  </main>

  <div data-slot="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="assets/js/loader.js"></script>
  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/footer.js"></script>
  <script src="assets/js/account.js"></script>
  <script src="assets/js/fx.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — Luno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <style>
    .co-grid { display: grid; grid-template-columns: 1fr 380px; gap: 3rem; align-items: start; }
    @media (max-width: 860px) { .co-grid { grid-template-columns: 1fr; } }
    .co-field { margin-bottom: 1rem; }
    .co-field input, .co-field textarea {
      width: 100%; border: 1px solid var(--line-2); padding: 1rem; font: inherit; background: #fff;
    }
    .co-summary { border: 1px solid var(--line-2); padding: 1.4rem; position: sticky; top: 90px; }
    .co-line { display: flex; gap: .8rem; align-items: center; padding: .7rem 0; border-bottom: 1px solid var(--line-2); }
    .co-line img { width: 52px; height: 68px; object-fit: cover; }
    .co-line small { color: var(--ink-2); display: block; }
    .co-total { display: flex; justify-content: space-between; font-weight: 700; padding-top: 1rem; }
    .co-done { text-align: center; padding: 3rem 1rem; }
    .co-num { font-size: 1.6rem; font-weight: 800; letter-spacing: .08em; margin: 1rem 0; }
  </style>
</head>
<body>
  <div class="loader" id="luno-loader"></div>
  <div data-slot="header"></div>

  <main class="container section" data-checkout>
    <h1 class="sec-title" style="margin-bottom:2rem">Checkout</h1>
    <div class="co-grid">
      <form data-co-form novalidate>
        <div class="co-field"><label class="pdp__label">Full Name *</label><input name="name" required maxlength="80" placeholder="Your name" /></div>
        <div class="co-field"><label class="pdp__label">Email *</label><input name="email" type="email" required maxlength="120" placeholder="you@example.com" /></div>
        <div class="co-field"><label class="pdp__label">Phone</label><input name="phone" maxlength="40" placeholder="03xx-xxxxxxx" /></div>
        <div class="co-field"><label class="pdp__label">Delivery Address *</label><textarea name="address" required rows="3" maxlength="500" placeholder="House, street, area"></textarea></div>
        <div class="co-field"><label class="pdp__label">City</label><input name="city" maxlength="100" placeholder="City" /></div>
        <p style="color:var(--ink-2);font-size:var(--fs-sm);margin:1rem 0">Payment: <b>Cash on Delivery</b>. You pay when your order arrives.</p>
        <button class="btn btn--block btn--lg" type="submit" data-co-submit>Place Order</button>
        <p data-co-error style="color:var(--sale);margin-top:.8rem;display:none"></p>
      </form>
      <aside class="co-summary">
        <h3 style="margin-bottom:.5rem">Your Bag</h3>
        <div data-co-items></div>
        <div class="co-total"><span>Total</span><span data-co-total></span></div>
      </aside>
    </div>
  </main>

  <div data-slot="footer"></div>

  <script src="assets/js/loader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/footer.js"></script>
  <script src="assets/js/checkout.js"></script>
  <script src="assets/js/fx.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luno Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/admin.css" />
</head>
<body class="adm">

  <!-- ======== LOGIN ======== -->
  <div class="adm-login" data-view="login" hidden>
    <div class="adm-moon adm-moon--left"><span class="moon moon--sand moon--float" style="width:100%;height:100%"></span></div>
    <div class="adm-moon adm-moon--right"><span class="moon moon--sand moon--float" style="width:100%;height:100%"></span></div>
    <div class="adm-login__card">
      <h1 class="adm-logo"><span class="moon moon--sand" style="width:26px;height:26px"></span>LUNO <span>ADMIN</span></h1>
      <div data-setup-note></div>
      <form data-login-form>
        <label>Email<input name="email" type="email" required autocomplete="username" /></label>
        <label>Password<input name="password" type="password" required autocomplete="current-password" /></label>
        <button class="adm-btn adm-btn--block" type="submit" data-login-btn>Sign In</button>
        <p class="adm-error" data-login-error hidden></p>
      </form>
      <p class="adm-login__foot">Staff access only · <a href="account.html">← Back to store</a></p>
    </div>
  </div>

  <!-- ======== APP ======== -->
  <div class="adm-app" data-view="app" hidden>
    <header class="adm-top">
      <h1 class="adm-logo"><span class="moon moon--sand" style="width:22px;height:22px"></span>LUNO <span>ADMIN</span></h1>
      <nav class="adm-nav">
        <button data-tab="products" class="is-active">Products</button>
        <button data-tab="categories">Categories</button>
        <button data-tab="orders">Orders</button>
      </nav>
      <div class="adm-top__right">
        <a href="index.html" target="_blank" rel="noopener">View Store ↗</a>
        <span data-admin-email></span>
        <button class="adm-btn adm-btn--ghost" data-logout>Sign Out</button>
      </div>
    </header>

    <main class="adm-main">
      <!-- Products -->
      <section data-panel="products">
        <div class="adm-panel-head">
          <h2>Products <span class="adm-count" data-prod-count></span></h2>
          <div>
            <input class="adm-search" data-prod-search placeholder="Search products…" />
            <button class="adm-btn" data-add-product>+ Add Product</button>
          </div>
        </div>
        <div class="adm-table-wrap"><table class="adm-table" data-prod-table></table></div>
      </section>

      <!-- Categories -->
      <section data-panel="categories" hidden>
        <div class="adm-panel-head">
          <h2>Categories</h2>
          <form class="adm-inline-form" data-cat-form>
            <input name="name" required maxlength="60" placeholder="New category name" />
            <button class="adm-btn" type="submit">+ Add</button>
          </form>
        </div>
        <div class="adm-table-wrap"><table class="adm-table" data-cat-table></table></div>
      </section>

      <!-- Orders -->
      <section data-panel="orders" hidden>
        <div class="adm-panel-head">
          <h2>Orders <span class="adm-count" data-order-count></span></h2>
          <select class="adm-select" data-order-filter>
            <option value="">All statuses</option>
            <option value="pending">Pending</option>
            <option value="confirmed">Confirmed</option>
            <option value="shipped">Shipped</option>
            <option value="delivered">Delivered</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
        <div class="adm-table-wrap"><table class="adm-table" data-order-table></table></div>
      </section>
    </main>
  </div>

  <!-- ======== PRODUCT EDITOR ======== -->
  <dialog class="adm-dialog" data-editor>
    <form method="dialog" class="adm-editor" data-editor-form>
      <div class="adm-editor__head">
        <h3 data-editor-title>Edit Product</h3>
        <button type="button" class="adm-btn adm-btn--ghost" data-editor-close>✕</button>
      </div>

      <div class="adm-editor__grid">
        <label class="span2">Name *<input name="name" required maxlength="120" /></label>
        <label>Category *
          <select name="category_slug" data-cat-select required></select>
        </label>
        <label>Fit / Subtitle<input name="fit" maxlength="40" placeholder="Regular Fit" /></label>
        <label>Department<input name="dept" maxlength="20" value="MEN" /></label>
        <label>Badge
          <select name="badge">
            <option value="">None</option>
            <option value="new">New</option>
            <option value="sale">Sale</option>
          </select>
        </label>
        <label>Price (PKR) *<input name="price" type="number" min="0" step="1" required /></label>
        <label>Compare-at Price (PKR)<input name="compare_at" type="number" min="0" step="1" placeholder="Optional — shows discount" /></label>
        <label class="span2">Description<textarea name="description" rows="3" maxlength="2000" placeholder="Shown on the product page"></textarea></label>
        <label class="span2">Sizes (comma separated)<input name="sizes" placeholder="S, M, L, XL, XXL" value="S, M, L, XL, XXL" /></label>

        <div class="span2">
          <span class="adm-label">Colors</span>
          <div data-color-rows></div>
          <button type="button" class="adm-btn adm-btn--ghost" data-add-color>+ Add Color</button>
        </div>

        <div class="span2">
          <span class="adm-label">Images (first = main photo)</span>
          <div class="adm-images" data-image-list></div>
          <input type="file" data-image-input accept="image/jpeg,image/png,image/webp,image/gif" multiple hidden />
          <button type="button" class="adm-btn adm-btn--ghost" data-upload-btn>⬆ Upload Images</button>
          <span class="adm-hint" data-upload-status></span>
        </div>

        <label class="adm-check"><input type="checkbox" name="active" checked /> Visible in store</label>
        <label class="adm-check"><input type="checkbox" name="sold_out" /> Sold out</label>
        <label>Sort position<input name="position" type="number" step="1" value="0" /></label>
      </div>

      <p class="adm-error" data-editor-error hidden></p>
      <div class="adm-editor__foot">
        <button type="button" class="adm-btn adm-btn--ghost" data-editor-close>Cancel</button>
        <button type="submit" class="adm-btn" data-editor-save>Save Product</button>
      </div>
    </form>
  </dialog>

  <div class="adm-toast" data-toast></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collection — Luno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body>
  <div class="loader" id="luno-loader"></div>
  <div data-slot="header"></div>

  <main class="container">
    <!-- Breadcrumb -->
    <nav class="crumb">
      <a href="index.html">Home</a> / <a href="collection.html?c=all&dept=men">Men</a> / <b data-crumb-cat>Men View All Collection</b>
    </nav>

    <h1 class="sec-title" data-title style="margin-bottom:1.4rem">Men View All Collection</h1>

    <!-- Category tabs -->
    <div class="tabbar" data-tabbar></div>

    <!-- Toolbar -->
    <div class="toolbar">
      <span class="toolbar__count" data-count>—</span>
      <div class="toolbar__right">
        <div class="layoutbtns" role="group" aria-label="Grid layout">
          <button data-layout="2" aria-label="2 columns"></button>
          <button data-layout="4" class="is-active" aria-label="4 columns"></button>
        </div>
        <select class="select" data-sort aria-label="Sort by">
          <option value="featured">Featured</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="discount">Biggest Discount</option>
          <option value="name">Alphabetical</option>
        </select>
      </div>
    </div>

    <!-- Product grid -->
    <section style="padding-bottom:4rem">
      <div class="grid-products" data-grid data-cols="4"></div>
    </section>
  </main>

  <div data-slot="footer"></div>

  <script src="assets/js/loader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/footer.js"></script>
  <script src="assets/js/collection.js"></script>
  <script src="assets/js/fx.js"></script>
  <script>
    // Inject layout-toggle icons after UI is ready
    document.addEventListener('DOMContentLoaded', function () {
      var I = window.LUNA.I;
      document.querySelector('[data-layout="2"]').innerHTML = I.grid2;
      document.querySelector('[data-layout="4"]').innerHTML = I.grid4;
    });
  </script>
</body>
</html>
